{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Class Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .game-canvas {
            image-rendering: pixelated; /* Keeps sprites sharp */
        }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col items-center justify-center p-4 overflow-hidden">

    <div class="text-center space-y-2 mb-8 animate-bounce">
        <h1 class="text-9xl font-bold text-teal-500 font-['Great_Vibes']" style="text-shadow: 0 0 20px rgba(20, 184, 166, 0.5);">404</h1>
        <h2 class="text-2xl font-bold text-white">Class Not Found!</h2>
        <p class="text-slate-400">You seem lost in the hallway. While you wait, try to get to class!</p>
    </div>

    <div class="relative group">
        <canvas id="gameCanvas" width="800" height="250" class="bg-slate-800 rounded-xl border-2 border-slate-700 shadow-2xl max-w-full"></canvas>
        
        <div id="gameOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 rounded-xl">
            <p class="text-2xl font-bold text-white mb-2">Late for Class!</p>
            <p class="text-slate-300 mb-4">Press <span class="text-teal-400 font-bold">[SPACE]</span> or <span class="text-teal-400 font-bold">Tap</span> to Jump</p>
            <button onclick="startGame()" class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-bold transition shadow-lg border border-teal-500">
                Start Running
            </button>
        </div>

        <div class="absolute top-4 right-4 bg-slate-900/50 px-3 py-1 rounded border border-slate-600">
            <span class="text-slate-400 text-xs uppercase">Score</span>
            <span id="score" class="text-xl font-mono text-teal-400 font-bold">0</span>
        </div>
        
        <div class="absolute top-4 left-4 bg-slate-900/50 px-3 py-1 rounded border border-slate-600">
            <span class="text-slate-400 text-xs uppercase">High Score</span>
            <span id="highScore" class="text-xl font-mono text-yellow-400 font-bold">0</span>
        </div>
    </div>

    <div class="mt-8 flex space-x-4">
        <button onclick="history.back()" class="text-slate-400 hover:text-white transition">Go Back</button>
        <span class="text-slate-600">|</span>
        <a href="{% url 'login'%}" class="text-teal-400 hover:text-teal-300 font-semibold transition">Return to Dashboard</a>
    </div>

    <script>
        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('gameOverlay');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');

        // Game Variables
        let isGameRunning = false;
        let animationId;
        let score = 0;
        let frameCount = 0;
        let gameSpeed = 5;
        let highScore = localStorage.getItem('psapp_highscore') || 0;
        highScoreEl.textContent = highScore;

        // Player (The Student)
        const player = {
            x: 50,
            y: 160, // Ground level
            w: 40,
            h: 40,
            dy: 0,
            jumpPower: -13,
            gravity: 0.6,
            grounded: false,
            emoji: "🏃"
        };

        // Obstacles (Desks/Barriers)
        let obstacles = [];

        function drawPlayer() {
            // Draw Emoji as player
            ctx.font = "35px Arial";
            ctx.fillText(player.emoji, player.x, player.y + 35);
        }

        function drawObstacles() {
            ctx.font = "30px Arial";
            obstacles.forEach(obs => {
                ctx.fillText("🚧", obs.x, obs.y + 30);
            });
        }

        function updateObstacles() {
            // Spawn logic
            if (frameCount % Math.floor(1200 / (gameSpeed * 2)) === 0) { // Spawn rate increases with speed
                obstacles.push({
                    x: canvas.width,
                    y: 165, // Obstacle ground level
                    w: 30,
                    h: 30
                });
            }

            // Move & Remove logic
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Collision Detection
                if (
                    player.x < obs.x + obs.w - 10 &&
                    player.x + player.w > obs.x + 10 &&
                    player.y < obs.y + obs.h - 10 &&
                    player.y + player.h > obs.y + 10
                ) {
                    gameOver();
                }

                // Remove off-screen
                if (obs.x + obs.w < 0) {
                    obstacles.shift();
                    score++;
                    scoreEl.textContent = score;
                    // Increase speed slightly every 5 obstacles
                    if(score % 5 === 0) gameSpeed += 0.2;
                }
            }
        }

        function updatePlayer() {
            // Jump Physics
            player.dy += player.gravity;
            player.y += player.dy;

            // Ground Collision
            if (player.y > 160) {
                player.y = 160;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }
        }

        function jump() {
            if (player.grounded && isGameRunning) {
                player.dy = player.jumpPower;
                player.grounded = false;
            } else if (!isGameRunning && overlay.classList.contains('hidden') === false) {
                startGame();
            }
        }

        function loop() {
            if (!isGameRunning) return;

            // Clear Canvas
            ctx.fillStyle = '#1e293b'; // slate-800
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Ground Line
            ctx.strokeStyle = '#334155'; // slate-700
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, 200);
            ctx.lineTo(canvas.width, 200);
            ctx.stroke();

            updatePlayer();
            updateObstacles();
            drawPlayer();
            drawObstacles();

            frameCount++;
            animationId = requestAnimationFrame(loop);
        }

        function startGame() {
            isGameRunning = true;
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            scoreEl.textContent = "0";
            overlay.classList.add('hidden');
            loop();
        }

        function gameOver() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);
            
            // Update High Score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('psapp_highscore', highScore);
                highScoreEl.textContent = highScore;
            }

            // Show Overlay
            overlay.classList.remove('hidden');
            overlay.innerHTML = `
                <p class="text-2xl font-bold text-red-400 mb-2">Busted!</p>
                <p class="text-slate-300 mb-4">Score: ${score}</p>
                <button onclick="startGame()" class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-bold transition shadow-lg border border-teal-500">Try Again</button>
            `;
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault(); // Stop scrolling
                jump();
            }
        });
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Initial Draw
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#334155'; 
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(canvas.width, 200); ctx.stroke();
    </script>
</body>
</html>
