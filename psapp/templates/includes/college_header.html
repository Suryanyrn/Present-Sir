<header class="fixed top-0 w-full z-50 glass-nav">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-teal-500 to-emerald-700 rounded-xl flex items-center justify-center shadow-lg shadow-teal-900/20">
            <i data-lucide="building-2" class="text-white w-6 h-6"></i>
          </div>
          <div>
            <h1 class="text-2xl font-['Great_Vibes'] text-white leading-none">Present Sir!!!</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold ml-1">Admin Console</p>
          </div>
        </div>

        <div class="flex items-center gap-6 h-full pb-1">
          <nav class="hidden md:flex gap-6 h-full items-end pb-4 text-sm font-semibold tracking-wide">
            <button onclick="ui.switchTab('departments')" id="nav-departments" class="tab-btn active transition-all duration-300 pb-1 flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4"></i> Departments</button>
            <button onclick="ui.switchTab('classes')" id="nav-classes" class="tab-btn transition-all duration-300 pb-1 flex items-center gap-2"><i data-lucide="book-open" class="w-4 h-4"></i> Classes</button>
            <button onclick="ui.switchTab('faculty')" id="nav-faculty" class="tab-btn transition-all duration-300 pb-1 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> Faculty</button>
            <button onclick="ui.switchTab('students')" id="nav-students" class="tab-btn transition-all duration-300 pb-1 flex items-center gap-2"><i data-lucide="user-check" class="w-4 h-4"></i> Students</button>
            <button onclick="ui.switchTab('profile')" id="nav-profile" class="tab-btn transition-all duration-300 pb-1 flex items-center gap-2"><i data-lucide="school" class="w-4 h-4"></i> Profile</button>
          </nav>

          <div class="relative pb-4">
            <button onclick="adminNotif.toggle()" class="p-2 text-slate-400 hover:text-white transition focus:outline-none">
              <i data-lucide="bell" class="w-5 h-5"></i>
              <span id="admin-badge" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border border-slate-900 animate-pulse"></span>
            </button>

            <div id="admin-notif-dropdown" class="hidden absolute right-0 top-12 w-80 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl overflow-hidden z-[100]">
              <div class="p-3 border-b border-slate-700 bg-slate-950 flex justify-between items-center">
                <h4 class="text-xs font-bold text-slate-300 uppercase">Updates</h4>
                <button onclick="adminNotif.toggle()" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-3 h-3"></i></button>
              </div>
              <div id="admin-notif-list" class="max-h-64 overflow-y-auto custom-scroll p-1">
                <p class="text-xs text-slate-500 text-center py-6">All caught up!</p>
              </div>
            </div>
          </div>

          <button class="md:hidden text-slate-300 pb-4"><i data-lucide="menu"></i></button>
        </div>
      </div>
    </header>
