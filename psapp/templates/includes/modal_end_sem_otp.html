<div id="modal-end-sem-otp" class="fixed inset-0 bg-red-900/90 backdrop-blur-sm hidden items-center justify-center z-[100]">
      <div class="bg-slate-800 w-full max-w-sm p-6 rounded-2xl border border-red-500 shadow-2xl text-center">
        <div class="w-12 h-12 bg-red-900/50 rounded-full flex items-center justify-center mx-auto mb-3 text-red-500 border-2 border-red-500">
          <i data-lucide="alert-octagon" class="w-6 h-6"></i>
        </div>
        <h3 class="text-xl font-bold text-white">End Current Semester?</h3>
        <p class="text-sm text-slate-400 mt-2 mb-6">
          This will <b>Archive</b> all active courses and mark the class as 'On Break'. OTP Required.
        </p>

        <div id="end-sem-step-1">
          <button onclick="classMgr.reqEndSemOtp()" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-bold">Request OTP</button>
          <button onclick="document.getElementById('modal-end-sem-otp').classList.add('hidden')" class="mt-3 text-slate-500 text-xs hover:text-white">Cancel</button>
        </div>

        <div id="end-sem-step-2" class="hidden space-y-4 mt-4">
          <input type="text" id="inp-end-sem-otp" placeholder="Enter OTP" class="w-full bg-slate-900 border border-slate-600 text-center text-xl tracking-widest text-white rounded-lg p-2 outline-none" maxlength="6" />
          <button onclick="classMgr.confirmEndSem()" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-bold">Confirm End</button>
        </div>
      </div>
    </div>
