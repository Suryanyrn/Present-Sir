<section id="view-classes" class="space-y-8 hidden animate-fade-in">
        <div class="flex justify-between items-end border-b border-slate-800 pb-6">
          <div>
            <h2 class="text-3xl font-bold text-white">Classrooms & Attendance</h2>
            <p class="text-slate-400 mt-2">View subject details, attendance records, and overall performance.</p>
          </div>
          <div id="cls-search-alumni-batch" class="flex gap-3 items-end">
            <div class="flex flex-col">
              <label class="text-xs text-slate-500 uppercase font-bold mb-1">Department</label>
              <select id="alumni-dept" class="bg-slate-800 border border-slate-600 text-white p-2 rounded-lg focus:border-teal-500 outline-none"></select>
            </div>
            <div class="flex flex-col">
              <label class="text-xs text-slate-500 uppercase font-bold mb-1">Batch Year</label>
              <input type="text" id="alumni-batch" placeholder="e.g. 2020-2024" class="bg-slate-800 border border-slate-600 text-white p-2 rounded-lg focus:border-teal-500 outline-none" />
            </div>
            <button onclick="classMgr.fetchAlumni()" class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg font-bold transition">Search</button>
          </div>
        </div>
        <div id="cls-view-alumni" class="hidden flex-1 flex flex-col overflow-y-auto custom-scroll h-full">
          <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h4 class="text-xl font-bold text-amber-400 flex items-center gap-2"><i data-lucide="graduation-cap"></i> Alumni Records</h4>
            <button onclick="ui.switchTab('classes')" class="text-sm text-slate-400 hover:text-white flex items-center transition"><i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back to Classes</button>
          </div>
          <div id="alumni-results" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="classes-analytics-container" class="space-y-8"></div>
      </section>
