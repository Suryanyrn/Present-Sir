<div id="modal-edit-student" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm hidden items-center justify-center z-[90]">
      <div class="bg-slate-800 w-full max-w-sm p-6 rounded-2xl border border-slate-700 shadow-2xl relative">
        <h3 class="text-xl font-bold text-white mb-4">Edit Student</h3>

        <input type="hidden" id="edit-stu-id" />

        <div class="space-y-4">
          <div>
            <label class="text-xs text-slate-500 uppercase font-bold">Reg No</label>
            <input type="text" id="edit-stu-reg" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-blue-500 outline-none" />
          </div>
          <div>
            <label class="text-xs text-slate-500 uppercase font-bold">Name</label>
            <input type="text" id="edit-stu-name" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-blue-500 outline-none" />
          </div>
          <div>
            <label class="text-xs text-slate-500 uppercase font-bold">Email</label>
            <input type="email" id="edit-stu-email" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-blue-500 outline-none" />
          </div>

          <div class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="document.getElementById('modal-edit-student').classList.add('hidden')" class="py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg font-bold">Cancel</button>
            <button onclick="classMgr.saveStudentEdit()" class="py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
