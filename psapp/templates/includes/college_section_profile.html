<section id="view-profile" class="hidden animate-fade-in max-w-3xl mx-auto">
        <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
          <div class="h-32 bg-gradient-to-r from-teal-900 to-slate-900 relative">
            <div class="absolute -bottom-10 left-8">
              <div class="w-24 h-24 bg-slate-800 rounded-2xl border-4 border-slate-800 flex items-center justify-center text-4xl font-bold text-teal-400 shadow-lg">{{ college.college_name|slice:':1' }}</div>
            </div>
          </div>

          <div class="pt-14 px-8 pb-8">
            <div class="flex justify-between items-start">
              <div>
                <h2 class="text-3xl font-bold text-white">{{ college.college_name }}</h2>
                <p class="text-slate-400 mt-1 flex items-center gap-2">
                  <i data-lucide="globe" class="w-4 h-4"></i> {{ college.website }}
                </p>
              </div>
              <span class="px-3 py-1 bg-green-500/10 text-green-400 text-xs font-bold rounded-full border border-green-500/20">VERIFIED INSTITUTE</span>
            </div>

            <div class="grid grid-cols-2 gap-6 mt-8">
              <div class="p-4 bg-slate-900 rounded-xl border border-slate-700/50 text-center">
                <p class="text-xs text-slate-500 uppercase font-bold">Total Departments</p>
                <p class="text-3xl font-bold text-white mt-1" id="stat-total-depts">0</p>
              </div>
              <div class="p-4 bg-slate-900 rounded-xl border border-slate-700/50 text-center">
                <p class="text-xs text-slate-500 uppercase font-bold">Active Faculty</p>
                <p class="text-3xl font-bold text-white mt-1" id="stat-total-faculty">0</p>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mt-6">
              <div class="p-4 bg-slate-900 rounded-xl border border-slate-700/50">
                <p class="text-xs text-slate-500 uppercase font-bold">College Code</p>
                <p class="text-lg text-white font-mono mt-1">{{ college.college_code }}</p>
              </div>
              <div class="p-4 bg-slate-900 rounded-xl border border-slate-700/50">
                <p class="text-xs text-slate-500 uppercase font-bold">Admin Email</p>
                <p class="text-lg text-white mt-1">{{ college.admin_email }}</p>
              </div>
            </div>

            <div class="mt-10 pt-8 border-t border-slate-700">
              <h3 class="text-lg font-bold text-red-400 flex items-center gap-2 mb-4"><i data-lucide="shield-alert" class="w-5 h-5"></i> Danger Zone</h3>
              <div class="bg-red-900/10 border border-red-900/30 rounded-xl overflow-hidden">
                <table class="w-full text-left text-sm">
                  <thead class="bg-red-900/20 text-red-300 font-bold text-xs uppercase">
                    <tr>
                      <th class="p-4">Department Name</th>
                      <th class="p-4 text-center">Established</th>
                      <th class="p-4 text-right">Action</th>
                    </tr>
                  </thead>
                  <tbody id="profile-dept-list" class="divide-y divide-red-900/20 text-slate-300"></tbody>
                </table>
              </div>
            </div>

            <div class="mt-8 pt-6">
              <a href="{% url 'psapp:college_logout' %}" class="w-full block text-center py-3 rounded-xl border border-slate-700 text-slate-400 hover:bg-slate-700 hover:text-white transition font-bold">Log Out Securely</a>
            </div>
          </div>
        </div>
      </section>
