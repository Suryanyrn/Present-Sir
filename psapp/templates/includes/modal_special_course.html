<div id="modal-special-course" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm hidden items-center justify-center z-[80]">
      <div class="bg-slate-800 w-full max-w-6xl max-h-[92vh] rounded-2xl border border-slate-700 shadow-2xl flex flex-col relative overflow-hidden">
        <!-- Header -->
        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900">
          <div>
            <h3 class="text-2xl font-bold text-white flex items-center gap-2">
              <i data-lucide="layers" class="text-purple-400 w-6 h-6"></i>
              Assign Elective/Lab Course
            </h3>
            <p class="text-sm text-slate-400 mt-1">Select students from any class in this department to form a batch.</p>
          </div>
          <button onclick="document.getElementById('modal-special-course').classList.add('hidden')" class="text-slate-400 hover:text-white p-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <!-- Content: Split into Section A (Config) and Section B (Student Selector) -->
        <div class="flex-1 overflow-y-auto custom-scroll flex flex-col gap-6 p-6">
          <!-- SECTION A: Configuration Panel -->
          <div class="grid grid-cols-4 gap-4 bg-slate-900/50 p-5 rounded-xl border border-slate-700">
            <div>
              <label class="text-xs text-slate-500 uppercase font-bold mb-2 block flex items-center gap-1">
                <span class="w-5 h-5 bg-purple-600 text-white rounded flex items-center justify-center text-xs">1</span>
                Batch Name
              </label>
              <input type="text" id="sp-batch-name" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-purple-500 outline-none" placeholder="e.g. Group A, Batch 1" />
            </div>

            <div>
              <label class="text-xs text-slate-500 uppercase font-bold mb-2 block flex items-center gap-1">
                <span class="w-5 h-5 bg-purple-600 text-white rounded flex items-center justify-center text-xs">2</span>
                Elective/Lab Course
              </label>
              <select id="sp-subject-select" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-purple-500 outline-none cursor-pointer">
                <option value="">Loading...</option>
              </select>
            </div>

            <div>
              <label class="text-xs text-slate-500 uppercase font-bold mb-2 block flex items-center gap-1">
                <span class="w-5 h-5 bg-purple-600 text-white rounded flex items-center justify-center text-xs">3</span>
                Assign Faculty
              </label>
              <div class="relative">
                <input type="text" id="sp-fac-search" onkeyup="specialMgr.filterFaculty()" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-purple-500 outline-none" placeholder="Search..." />
                <div id="sp-fac-list" class="hidden absolute top-full left-0 right-0 mt-1 max-h-40 overflow-y-auto bg-slate-900 border border-slate-700 rounded-lg z-10 shadow-lg"></div>
                <input type="hidden" id="sp-fac-selected" />
              </div>
            </div>

            <div>
              <label class="text-xs text-slate-500 uppercase font-bold mb-2 block flex items-center gap-1">
                <span class="w-5 h-5 bg-purple-600 text-white rounded flex items-center justify-center text-xs">4</span>
                Total Hours
              </label>
              <input type="number" id="sp-total-hours" value="45" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-white focus:border-purple-500 outline-none" />
            </div>
          </div>

          <!-- SECTION B: Student Selector -->
          <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700">
            <h4 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
              <i data-lucide="users" class="w-4 h-4 text-teal-400"></i>
              Student Selection
            </h4>

            <!-- Filters: Class & Section -->
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div>
                <label class="text-xs text-slate-500 uppercase font-bold mb-2 block">Select Class</label>
                <select id="sp-filter-class" onchange="specialMgr.loadStudentsForSelection()" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-2.5 text-sm outline-none focus:border-teal-500">
                  <option value="">-- Select Class --</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-500 uppercase font-bold mb-2 block">Select Section</label>
                <select id="sp-filter-section" onchange="specialMgr.filterStudentTable()" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-2.5 text-sm outline-none focus:border-teal-500">
                  <option value="all">All Sections</option>
                  <option value="A">Section A</option>
                  <option value="B">Section B</option>
                  <option value="C">Section C</option>
                </select>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-2 mb-4">
              <button onclick="specialMgr.toggleAll(true)" class="px-4 py-2 bg-teal-600 hover:bg-teal-500 text-white text-xs rounded-lg font-bold transition flex items-center gap-1"><i data-lucide="check-square" class="w-4 h-4"></i> Select All</button>
              <button onclick="specialMgr.toggleAll(false)" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white text-xs rounded-lg font-bold transition flex items-center gap-1"><i data-lucide="x-square" class="w-4 h-4"></i> Clear All</button>
            </div>

            <!-- Table Header -->
            <div class="grid grid-cols-12 gap-3 px-4 py-3 bg-slate-900 text-xs text-slate-400 uppercase font-bold border-b border-slate-700 rounded-t-lg">
              <div class="col-span-1 text-center">
                <input type="checkbox" id="sp-master-checkbox" onchange="specialMgr.toggleAll(this.checked)" class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-purple-600 cursor-pointer" />
              </div>
              <div class="col-span-2">Reg No</div>
              <div class="col-span-3">Student Name</div>
              <div class="col-span-2">Class</div>
              <div class="col-span-2">Section</div>
            </div>

            <!-- Student List -->
            <div id="sp-student-list" class="max-h-60 overflow-y-auto bg-slate-900/30 border border-t-0 border-slate-700 rounded-b-lg">
              <p class="text-center text-slate-500 py-8">👆 Select a class to load students</p>
            </div>
          </div>

          <!-- Footer Summary & Action -->
          <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700 flex justify-between items-center">
            <div class="flex gap-6">
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Total Selected</p>
                <p class="text-2xl font-bold text-teal-400">
                  <span id="sp-count-display">0</span> students
                </p>
              </div>
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Assigned Faculty</p>
                <p id="sp-summary-fac" class="text-lg font-bold text-purple-400">-- Not Selected --</p>
              </div>
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Selected Course</p>
                <p id="sp-summary-course" class="text-lg font-bold text-orange-400">-- Not Selected --</p>
              </div>
            </div>
            <button onclick="specialMgr.submit()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white font-bold rounded-lg shadow-lg transition transform active:scale-95 flex items-center gap-2">
              <i data-lucide="plus-circle" class="w-5 h-5"></i>
              Create & Invite
            </button>
          </div>
        </div>
      </div>
    </div>
