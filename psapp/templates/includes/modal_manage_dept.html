<div id="modal-manage-dept" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm hidden items-center justify-center z-[60]">
      <div class="bg-slate-800 w-full max-w-4xl h-[85vh] rounded-2xl border border-slate-700 shadow-2xl flex flex-col overflow-hidden relative">
        <div class="p-6 border-b border-slate-700 bg-slate-800 flex justify-between items-center shrink-0">
          <div class="flex items-center gap-4">
            <button id="btn-back-home" onclick="resourceMgr.showHome()" class="hidden p-2 bg-slate-700/50 hover:bg-slate-700 text-slate-300 rounded-lg transition"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <div>
              <h3 class="text-2xl font-bold text-white" id="manage-dept-title">Department Name</h3>
              <p class="text-sm text-slate-400">
                Est: <span id="manage-dept-year" class="font-mono text-teal-400">2024</span> • Resource Console
              </p>
            </div>
          </div>
          <button onclick="modals.close('modal-manage-dept')" class="p-2 bg-slate-700/50 hover:bg-red-900/30 text-slate-300 hover:text-red-400 rounded-lg transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll p-8">
          <div id="res-view-home" class="grid grid-cols-1 md:grid-cols-3 gap-6 h-full items-center">
            <button onclick="resourceMgr.showAddClass()" class="group bg-slate-700/30 hover:bg-blue-900/20 border border-slate-700 hover:border-blue-500/50 rounded-2xl p-8 text-center transition-all duration-300 hover:-translate-y-1">
              <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-600 transition shadow-lg">
                <i data-lucide="users" class="w-8 h-8 text-blue-400 group-hover:text-white"></i>
              </div>
              <h4 class="text-xl font-bold text-white mb-2">Add Class</h4>
              <p class="text-sm text-slate-400">Create a new batch & add students.</p>
            </button>

            <button onclick="resourceMgr.showAddFaculty()" class="group bg-slate-700/30 hover:bg-purple-900/20 border border-slate-700 hover:border-purple-500/50 rounded-2xl p-8 text-center transition-all duration-300 hover:-translate-y-1">
              <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:bg-purple-600 transition shadow-lg">
                <i data-lucide="user-check" class="w-8 h-8 text-purple-400 group-hover:text-white"></i>
              </div>
              <h4 class="text-xl font-bold text-white mb-2">Add Faculty</h4>
              <p class="text-sm text-slate-400">Invite faculty via ID.</p>
            </button>

            <button onclick="resourceMgr.showManageSubjects()" class="group bg-slate-700/30 hover:bg-amber-900/20 border border-slate-700 hover:border-amber-500/50 rounded-2xl p-8 text-center transition-all duration-300 hover:-translate-y-1">
              <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:bg-amber-600 transition shadow-lg">
                <i data-lucide="book-open" class="w-8 h-8 text-amber-400 group-hover:text-white"></i>
              </div>
              <h4 class="text-xl font-bold text-white mb-2">Manage Subjects</h4>
              <p class="text-sm text-slate-400">View, Edit & Delete Subjects.</p>
            </button>
          </div>

          <div id="res-view-class" class="hidden max-w-2xl mx-auto space-y-6">
            <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700">
              <h4 class="text-lg font-bold text-blue-400 mb-6 flex items-center gap-2"><i data-lucide="info"></i> Step 1: Class Details</h4>

              <input type="hidden" id="sys-academic-year" value="{% now 'Y' %}" />
              <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-300">Class Name *</label>
                    <input type="text" id="cls-name" class="w-full px-4 py-2 bg-slate-700 text-white border border-slate-700 rounded-lg" placeholder="B.Tech CS" />
                  </div>

                  <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-300">Section *</label>
                    <input type="text" id="cls-section" class="w-full px-4 py-2 bg-slate-700 text-white border border-slate-700 rounded-lg uppercase font-bold" placeholder="A" />
                  </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label class="text-xs text-slate-500 uppercase font-bold">Batch Duration</label>
                    <div class="flex items-center gap-2 mt-1">
                      <input type="number" id="cls-batch-start" oninput="ui.calcBatchYear()" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500 outline-none text-center" placeholder="Start" />
                      <span class="text-slate-500">-</span>
                      <input type="number" id="cls-batch-end" oninput="ui.calcBatchYear()" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:border-blue-500 outline-none text-center" placeholder="End" />
                    </div>
                  </div>

                  <div>
                    <label class="text-xs text-slate-500 uppercase font-bold">Current Year</label>
                    <div class="relative">
                      <input type="text" id="cls-current-year-display" readonly class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-teal-400 font-bold mt-1 cursor-not-allowed" placeholder="Auto-calc" />

                      <input type="hidden" id="cls-current-year" />

                      <div class="absolute inset-y-0 right-3 flex items-center mt-1 pointer-events-none">
                        <i data-lucide="calculator" class="w-4 h-4 text-slate-600"></i>
                      </div>
                    </div>
                  </div>

                  <div>
                    <label class="text-xs text-slate-500 uppercase font-bold">Total Students</label>
                    <input type="number" id="cls-total-stu" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-blue-500 outline-none" placeholder="60" />
                  </div>
                </div>

                <div id="batch-warning" class="hidden p-3 bg-red-900/20 border border-red-500/50 rounded-lg text-red-400 text-xs text-center"></div>

                <button onclick="resourceMgr.goToStudentEntry()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold shadow-lg mt-2 transition transform active:scale-95">Next: Add Student Roster &rarr;</button>
              </div>
            </div>
          </div>

          <div id="res-view-students" class="hidden max-w-2xl mx-auto h-full flex flex-col">
            <div class="flex-1 overflow-y-auto">
              <h4 class="text-lg font-bold text-green-400 mb-4 flex items-center gap-2 sticky top-0 bg-slate-800 py-2 z-10"><i data-lucide="users"></i> Step 2: Student Roster</h4>
              <p class="text-sm text-slate-400 mb-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                Enter details for <span id="student-entry-count" class="text-white font-bold font-mono text-lg">0</span> students.
              </p>
              <div id="student-rows-container" class="space-y-3 pb-4 pr-2"></div>
            </div>
            <div class="pt-4 border-t border-slate-700 bg-slate-800 shrink-0">
              <button onclick="resourceMgr.submitClass()" class="w-full py-3 bg-green-600 hover:bg-green-500 text-white rounded-lg font-bold shadow-lg transition transform active:scale-95">Confirm & Create Class</button>
            </div>
          </div>

          <div id="res-view-faculty" class="hidden max-w-lg mx-auto">
            <div class="bg-slate-900/50 p-8 rounded-2xl border border-slate-700 text-center">
              <div class="w-16 h-16 bg-purple-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-400">
                <i data-lucide="user-plus" class="w-8 h-8"></i>
              </div>
              <h4 class="text-xl font-bold text-white mb-2">Invite Faculty</h4>
              <div class="flex gap-2 mb-6">
                <input type="text" id="fac-search-input" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-center tracking-widest font-mono uppercase" placeholder="PS-FAC-XXXX" /><button onclick="resourceMgr.searchFaculty()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 rounded-lg"><i data-lucide="search"></i></button>
              </div>
              <div id="fac-result-card" class="hidden bg-slate-800 p-4 rounded-xl border border-slate-600 animate-fade-in">
                <div class="flex items-center gap-4 text-left">
                  <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center text-lg font-bold text-slate-300" id="fac-res-initials"></div>
                  <div>
                    <h5 class="text-white font-bold" id="fac-res-name"></h5><p class="text-xs text-slate-400" id="fac-res-email"></p>
                  </div>
                </div>
                <button onclick="resourceMgr.sendInvite()" class="w-full mt-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg font-bold text-sm">Send Join Request</button>
              </div>
            </div>
          </div>

          <div id="res-view-subjects-list" class="hidden max-w-2xl mx-auto h-full flex flex-col">
            <div class="mb-4">
              <div class="flex justify-between items-center mb-4">
                <h4 class="text-xl font-bold text-amber-400 flex items-center gap-2"><i data-lucide="library"></i> Registered Subjects</h4>
                <button onclick="resourceMgr.showAddCourse()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg flex items-center gap-2 transition hover:-translate-y-0.5"><i data-lucide="plus" class="w-4 h-4"></i> Add New</button>
              </div>
              <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-500"></i>
                <input type="text" id="subject-search" onkeyup="resourceMgr.filterSubjects()" placeholder="Search subjects by name or code..." class="w-full bg-slate-900 border border-slate-600 text-white pl-10 pr-4 py-2.5 rounded-xl focus:border-amber-500 outline-none transition" />
              </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll bg-slate-900/50 rounded-xl border border-slate-700 p-4">
              <table class="w-full text-left text-sm">
                <thead class="text-slate-500 uppercase font-bold text-xs border-b border-slate-700">
                  <tr>
                    <th class="pb-3 pl-2">Code</th>
                    <th class="pb-3">Subject Name</th>
                    <th class="pb-3 text-right pr-2">Actions</th>
                  </tr>
                </thead>
                <tbody id="subject-list-body" class="divide-y divide-slate-700/50 text-slate-300"></tbody>
              </table>
              <div id="no-subjects-msg" class="hidden text-center py-10 text-slate-500">
                <p>No subjects found.</p>
              </div>
            </div>
          </div>

          <div id="res-view-course" class="hidden max-w-md mx-auto">
            <div class="bg-slate-900/50 p-8 rounded-2xl border border-slate-700 relative">
              <button onclick="resourceMgr.showManageSubjects()" class="absolute top-6 left-6 text-slate-400 hover:text-white transition flex items-center text-sm font-medium"><i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back</button>

              <div class="text-center mb-6 mt-4">
                <div class="w-12 h-12 bg-amber-900/30 rounded-full flex items-center justify-center mx-auto mb-3 text-amber-400">
                  <i data-lucide="book-open" class="w-6 h-6"></i>
                </div>
                <h4 id="form-subject-title" class="text-xl font-bold text-white">Add Subject</h4>
              </div>

              <div class="space-y-4">
                <div>
                  <label class="text-xs text-slate-500 uppercase font-bold ml-1">Course Title</label>
                  <input type="text" id="course-title-in" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-amber-500 outline-none" placeholder="e.g. Thermodynamics" />
                </div>
                <div>
                  <label class="text-xs text-slate-500 uppercase font-bold ml-1">Course Code</label>
                  <input type="text" id="course-code-in" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-amber-500 outline-none" placeholder="e.g. ME-301" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="text-xs text-slate-500 uppercase font-bold ml-1">Semester</label>
                    <select id="course-sem-in" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white mt-1">
                      <!-- FIX: Dynamically populated based on course duration (3-year=5 sem, 4-year=8 sem) -->
                      <option value="1">Sem 1</option>
                      <option value="2">Sem 2</option>
                      <option value="3">Sem 3</option>
                      <option value="4">Sem 4</option>
                      <option value="5">Sem 5</option>
                      <option value="6">Sem 6</option>
                      <option value="7">Sem 7</option>
                      <option value="8">Sem 8</option>
                    </select>
                  </div>
                  <div>
                    <label class="text-xs text-slate-500 uppercase font-bold ml-1">Type</label>
                    <select id="course-type-in" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white mt-1">
                      <option value="Core">Core Paper</option>
                      <option value="Elective">Elective</option>
                      <option value="Lab">Practical/Lab</option>
                    </select>
                  </div>
                </div>
                <button onclick="resourceMgr.submitCourse()" id="btn-submit-course" class="w-full py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-lg font-bold shadow-lg mt-2 transition transform active:scale-95">Save Subject</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
