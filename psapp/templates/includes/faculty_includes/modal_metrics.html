<div id="metrics-modal" class="form-modal fixed inset-0 bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-4 z-[80] hidden">
  <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-6 border border-slate-700 relative">
    <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
      <div>
        <h2 class="text-2xl font-bold text-white">Class Analytics</h2><p class="text-slate-400 text-sm">Real-time performance insights</p>
      </div>
      <button id="close-metrics-btn" class="text-slate-400 hover:text-white bg-slate-700 p-2 rounded-lg transition"><i data-lucide="x"></i></button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 shadow-inner">
        <div class="flex items-center space-x-3 mb-2">
          <div class="p-2 bg-blue-900/30 rounded-lg text-blue-400">
            <i data-lucide="users" class="w-5 h-5"></i>
          </div>
          <p class="text-slate-400 text-sm">Total Students</p>
        </div>
        <p id="metric-total-students" class="text-3xl font-bold text-white pl-2">0</p>
      </div>
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 shadow-inner">
        <div class="flex items-center space-x-3 mb-2">
          <div class="p-2 bg-purple-900/30 rounded-lg text-purple-400">
            <i data-lucide="calendar" class="w-5 h-5"></i>
          </div>
          <p class="text-slate-400 text-sm">Total Sessions</p>
        </div>
        <p id="metric-total-sessions" class="text-3xl font-bold text-white pl-2">0</p>
      </div>
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 shadow-inner">
        <div class="flex items-center space-x-3 mb-2">
          <div class="p-2 bg-teal-900/30 rounded-lg text-teal-400">
            <i data-lucide="clock" class="w-5 h-5"></i>
          </div>
          <p class="text-slate-400 text-sm">Total Hours</p>
        </div>
        <p id="metric-total-hours" class="text-3xl font-bold text-teal-400 pl-2">0</p>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
        <h4 class="text-sm font-semibold text-slate-300 mb-4 flex items-center"><i data-lucide="trending-up" class="w-4 h-4 mr-2 text-teal-400"></i> Attendance Trend</h4><div class="relative w-full" style="height: 300px;">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
        <h4 class="text-sm font-semibold text-slate-300 mb-4 flex items-center"><i data-lucide="pie-chart" class="w-4 h-4 mr-2 text-blue-400"></i> Overall Participation</h4><div class="relative w-full" style="height: 300px;">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
