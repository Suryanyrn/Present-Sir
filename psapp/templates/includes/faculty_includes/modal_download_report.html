<div id="download-report-modal" class="form-modal fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-[100] hidden">
  <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-md p-6 border border-slate-700">
    <h2 class="text-xl font-bold text-white mb-4">Download Attendance Report</h2>
    <div class="space-y-4">
      <label class="flex items-center space-x-3 p-3 bg-slate-700/50 rounded-lg cursor-pointer"><input type="radio" name="report-type" value="all" checked class="text-teal-500 focus:ring-teal-500" /><span class="text-slate-200">Entire History</span></label>
      <label class="flex items-center space-x-3 p-3 bg-slate-700/50 rounded-lg cursor-pointer"><input type="radio" name="report-type" value="custom" class="text-teal-500 focus:ring-teal-500" /><span class="text-slate-200">Date Range</span></label>
      <div id="custom-date-inputs" class="grid grid-cols-2 gap-2 hidden pl-8">
        <input type="date" id="report-start" class="bg-slate-700 text-white rounded px-2 py-1 text-sm" />
        <input type="date" id="report-end" class="bg-slate-700 text-white rounded px-2 py-1 text-sm" />
      </div>
    </div>
    <div class="flex justify-end space-x-3 pt-6">
      <button onclick="document.getElementById('download-report-modal').classList.add('hidden')" class="text-slate-400 px-3 py-2">Cancel</button>
      <button id="confirm-download-btn" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-bold">Download</button>
    </div>
  </div>
</div>
