<div id="edit-student-modal" class="form-modal fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-[60] hidden">
  <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-md p-6 border border-slate-600">
    <h2 class="text-xl font-bold text-white mb-4">Edit Student Details</h2>
    <form id="edit-student-form" class="space-y-4">
      <input type="hidden" id="edit-student-id" />
      <div>
        <label class="text-sm text-slate-400">Registration Number</label><input type="text" id="edit-student-reg" class="w-full px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" required />
      </div>
      <div>
        <label class="text-sm text-slate-400">Student Name</label><input type="text" id="edit-student-name" class="w-full px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" required />
      </div>
      <div>
        <label class="text-sm text-slate-400">Student Email (Optional)</label><input type="email" id="edit-student-email" class="w-full px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" placeholder="student@example.com" />
      </div>
      <div class="flex justify-end space-x-3 pt-4">
        <button type="button" id="cancel-edit-student" class="text-slate-400 hover:text-white px-3 py-2 transition">Cancel</button>
        <button type="submit" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-semibold transition">Save Changes</button>
      </div>
    </form>
  </div>
</div>
