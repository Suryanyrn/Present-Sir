<div id="take-attendance-modal" class="form-modal fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
  <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto p-6 relative">
    <h2 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-2">Take Attendance</h2>
    <form id="take-attendance-form" class="space-y-6">
      <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-xs font-medium text-teal-400 mb-1 uppercase">Date</label><input type="date" id="attendance-date" required class="w-full px-3 py-2 bg-slate-800 text-white border border-slate-600 rounded-lg outline-none" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">From Session</label><input type="number" id="session-start" min="1" max="8" value="1" required class="w-full px-3 py-2 bg-slate-800 text-white border border-slate-600 rounded-lg text-center font-bold" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase">To Session</label><input type="number" id="session-end" min="1" max="8" value="1" required class="w-full px-3 py-2 bg-slate-800 text-white border border-slate-600 rounded-lg text-center font-bold" />
          </div>
        </div>
        <div class="grid grid-cols-4 gap-2 border-t border-slate-800 pt-4 text-center">
          <div class="border-r border-slate-800">
            <p class="text-[10px] text-slate-500 uppercase">Total</p>
            <p id="summary-total" class="text-xl font-bold text-white">0</p>
          </div>
          <div class="border-r border-slate-800">
            <p class="text-[10px] text-green-500 uppercase">Present</p>
            <p id="summary-present" class="text-xl font-bold text-green-400">0</p>
          </div>
          <div class="border-r border-slate-800">
            <p class="text-[10px] text-blue-500 uppercase">OD</p>
            <p id="summary-od" class="text-xl font-bold text-blue-400">0</p>
          </div>
          <div>
            <p class="text-[10px] text-red-500 uppercase">Absent</p>
            <p id="summary-absent" class="text-xl font-bold text-red-400">0</p>
          </div>
        </div>
      </div>
      <div>
        <h3 class="text-lg font-semibold text-white mb-2 flex items-center justify-between"><span>Student Roster</span><span class="text-xs font-normal text-slate-400 bg-slate-800 px-2 py-1 rounded">Default: Present</span></h3>
        <div id="attendance-student-list" class="space-y-2 custom-scroll max-h-[300px] overflow-y-auto pr-2"></div>
      </div>
      <div class="flex justify-end space-x-4 pt-2 border-t border-slate-700">
        <button type="button" id="cancel-attendance" class="px-4 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition">Cancel</button>
        <button type="submit" id="save-attendance-btn" class="px-6 py-2 text-sm font-semibold rounded-lg bg-teal-600 hover:bg-teal-700 text-white shadow-lg transition transform active:scale-95">Save Session</button>
      </div>
    </form>
  </div>
</div>
