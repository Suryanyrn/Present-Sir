<div id="student-profile-modal" class="form-modal fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-[70] hidden">
  <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-sm border border-slate-700 relative flex flex-col max-h-[85vh]">
    <div class="absolute top-0 right-0 p-4 z-10">
      <button onclick="document.getElementById('student-profile-modal').classList.add('hidden')" class="bg-slate-700/50 hover:bg-slate-600 text-slate-400 hover:text-white p-2 rounded-full transition"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="overflow-y-auto p-6 custom-scroll">
      <div class="text-center mb-6 mt-2">
        <div class="w-20 h-20 bg-slate-700 rounded-full mx-auto flex items-center justify-center mb-3 shadow-inner border-2 border-slate-600" id="profile-pic-placeholder">
          <span class="text-3xl font-bold text-slate-400" id="profile-initials">JN</span>
        </div>
        <h2 id="profile-name" class="text-2xl font-bold text-white">Student Name</h2>
        <p id="profile-reg" class="text-teal-400 font-mono font-medium">REG12345</p>
        <p id="profile-class" class="text-xs text-slate-500 mt-1">Class Name</p>
      </div>
      <div class="flex justify-center mb-6">
        <span id="profile-status-badge" class="px-4 py-1 rounded-full text-sm font-bold bg-green-900 text-green-400 border border-green-700">Safe Zone</span>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="bg-slate-900 p-3 rounded-lg text-center border border-slate-700">
          <p class="text-[10px] text-slate-400 uppercase tracking-wider">Attendance</p>
          <p id="profile-percent" class="text-2xl font-bold text-white">0%</p>
        </div>
        <div class="bg-slate-900 p-3 rounded-lg text-center border border-slate-700">
          <p class="text-[10px] text-slate-400 uppercase tracking-wider">Sessions</p>
          <p id="profile-total" class="text-xl font-bold text-slate-200">0</p>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div class="bg-green-900/10 p-2 rounded-lg text-center border border-green-900/30">
          <p class="text-[10px] text-green-400 uppercase tracking-wider">Present</p>
          <p id="profile-present" class="text-xl font-bold text-green-400">0</p>
        </div>
        <div class="bg-blue-900/10 p-2 rounded-lg text-center border border-blue-900/30">
          <p class="text-[10px] text-blue-400 uppercase tracking-wider">On Duty</p>
          <p id="profile-od" class="text-xl font-bold text-blue-400">0</p>
        </div>
        <div class="bg-red-900/10 p-2 rounded-lg text-center border border-red-900/30">
          <p class="text-[10px] text-red-400 uppercase tracking-wider">Absent</p>
          <p id="profile-absent" class="text-xl font-bold text-red-400">0</p>
        </div>
      </div>
      <div class="mt-6 pt-6 border-t border-slate-700">
        <h3 class="text-sm font-bold text-slate-300 mb-3 flex items-center"><i data-lucide="calculator" class="w-4 h-4 mr-2 text-teal-400"></i> Safe Skip Calculator</h3>
        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
          <p class="text-xs text-slate-400 mb-2">Based on current attendance:</p>
          <div id="skip-calc-result" class="text-sm font-medium text-white leading-relaxed">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>
