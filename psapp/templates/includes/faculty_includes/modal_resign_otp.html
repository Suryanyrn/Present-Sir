<div id="modal-resign-otp" class="form-modal fixed inset-0 bg-red-900/90 backdrop-blur-sm hidden items-center justify-center p-4 z-[100]">
  <div class="bg-slate-800 w-full max-w-sm p-6 rounded-2xl border border-red-500 shadow-2xl relative text-center">
    <div class="w-16 h-16 bg-red-900/50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-red-500">
      <i data-lucide="alert-octagon" class="w-8 h-8"></i>
    </div>
    <h3 class="text-xl font-bold text-white mb-2">Confirm Resignation</h3>
    <p class="text-sm text-slate-400 mb-6">This will remove you from the college roster and unassign all your classes. OTP required.</p>

    <div id="resign-step-1">
      <button onclick="profileManager.sendResignOtp()" class="w-full py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold transition">Send OTP to Email</button>
    </div>

    <div id="resign-step-2" class="hidden space-y-4">
      <input type="text" id="resign-otp-input" class="w-full bg-slate-900 border border-slate-600 text-white text-center text-xl tracking-widest py-2 rounded-lg" placeholder="OTP" />
      <button onclick="profileManager.confirmResign()" class="w-full py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold transition">Confirm & Leave</button>
    </div>
    <button onclick="document.getElementById('modal-resign-otp').classList.add('hidden')" class="mt-4 text-slate-500 text-sm hover:text-white">Cancel</button>
  </div>
</div>
