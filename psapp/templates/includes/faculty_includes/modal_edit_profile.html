<div id="edit-profile-modal" class="form-modal fixed inset-0 bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-4 z-[90] hidden">
  <div class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700 relative flex flex-col overflow-hidden max-h-[90vh]">
    <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50 shrink-0">
      <h2 class="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="user-cog" class="text-teal-400 w-5 h-5"></i> Edit My Profile</h2>
      <button onclick="document.getElementById('edit-profile-modal').classList.add('hidden')" class="text-slate-400 hover:text-white transition"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>

    <div class="p-8 overflow-y-auto custom-scroll">
      <form id="edit-profile-form" class="space-y-6">
        <div class="flex items-center gap-5 p-4 bg-slate-900/50 rounded-xl border border-slate-700">
          <div class="w-20 h-20 rounded-full bg-slate-800 overflow-hidden border-2 border-teal-500/50 relative group cursor-pointer">
            <img id="preview-profile-photo" src="" class="w-full h-full object-cover hidden" />
            <div id="preview-initials" class="w-full h-full flex items-center justify-center text-slate-500">
              <i data-lucide="camera" class="w-8 h-8"></i>
            </div>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Update Photo</label>
            <input type="file" id="edit-profile-photo" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-slate-700 file:text-teal-400 hover:file:bg-slate-600 transition cursor-pointer" />
            <p class="text-[10px] text-slate-500 mt-1">Recommended: Square JPG/PNG</p>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Full Name</label>
          <input type="text" id="edit-name" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white focus:border-teal-500 outline-none transition" required />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Designation</label>
            <input type="text" id="edit-desig" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white focus:border-teal-500 outline-none transition" />
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Mobile Number</label>
            <input type="text" id="edit-mobile" class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl text-white focus:border-teal-500 outline-none transition" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-slate-900/30 rounded-xl border border-slate-700/50">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Department</label>
            <input type="text" id="edit-dept" class="w-full bg-transparent text-slate-300 font-mono text-sm outline-none border-none p-0 cursor-not-allowed" readonly />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">College</label>
            <input type="text" id="edit-college_name" class="w-full bg-transparent text-slate-300 font-mono text-sm outline-none border-none p-0 cursor-not-allowed" readonly />
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-700/50 mt-4">
          <button type="button" id="cancel-edit-profile" onclick="document.getElementById('edit-profile-modal').classList.add('hidden')" class="px-5 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700 transition font-medium">Cancel</button>
          <button type="submit" class="px-6 py-2.5 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-bold shadow-lg shadow-teal-900/20 transition transform active:scale-95 flex items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> Save Profile</button>
        </div>
      </form>
    </div>
  </div>
</div>
