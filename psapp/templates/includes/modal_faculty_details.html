<div id="modal-faculty-details" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center z-[80]">
      <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl border border-slate-700 shadow-2xl relative">
        <button onclick="document.getElementById('modal-faculty-details').classList.add('hidden')" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>

        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl font-bold text-white" id="term-fac-initials"></div>
          <div>
            <h3 class="text-xl font-bold text-white" id="term-fac-name"></h3>
            <p class="text-sm text-slate-400" id="term-fac-email"></p>
          </div>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mb-6">
          <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">Assigned Classes</h4>
          <ul id="term-fac-courses" class="text-sm text-slate-300 list-disc pl-4 space-y-1 custom-scroll max-h-32 overflow-y-auto"></ul>
        </div>

        <div class="mb-6">
          <label class="text-xs text-slate-400 uppercase font-bold mb-1 block">Transfer Classes To (Optional)</label>
          <select id="term-replacement-select" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-2.5 text-sm focus:border-teal-500 outline-none">
            <option value="">-- Do not transfer (Unassign) --</option>
          </select>
          <p class="text-[10px] text-slate-500 mt-1">Select a colleague to inherit attendance history immediately.</p>
        </div>

        <button onclick="facultyMgr.terminate()" class="w-full py-3 bg-red-900/20 text-red-400 border border-red-900/50 hover:bg-red-600 hover:text-white rounded-xl font-bold transition flex items-center justify-center gap-2"><i data-lucide="user-x" class="w-4 h-4"></i> Terminate & Transfer</button>
      </div>
    </div>
