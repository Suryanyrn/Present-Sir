<div id="modal-deleted-history-class" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center z-[60]">
      <div class="bg-slate-800 p-8 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl relative transition-all duration-300">
        <button onclick="modals.close('modal-deleted-history-class')" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>

        <div class="text-center mb-6">
          <div class="w-12 h-12 bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-3 text-red-400">
            <i data-lucide="trash-2" class="w-6 h-6"></i>
          </div>
          <h3 class="text-xl font-bold text-white">Deleted Students History</h3>
          <p class="text-sm text-slate-400 mt-1">Select a class to view deleted students</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="text-xs text-slate-500 uppercase font-bold ml-1 block mb-2">Department</label>
            <select id="del-hist-dept-select" onchange="api.populateDeletedHistoryClasses()" class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg p-3 outline-none focus:border-red-500 cursor-pointer">
              <option value="">-- Select Department --</option>
            </select>
          </div>

          <div>
            <label class="text-xs text-slate-500 uppercase font-bold ml-1 block mb-2">Class</label>
            <select id="del-hist-class-select" class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg p-3 outline-none focus:border-red-500 cursor-pointer disabled:opacity-50" disabled>
              <option value="">-- Select Class --</option>
            </select>
          </div>

          <button onclick="api.viewDeletedStudentsFromModal()" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold shadow-lg transition transform active:scale-95">View Deleted Students</button>
        </div>
      </div>
    </div>
