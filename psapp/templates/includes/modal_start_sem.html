<div id="modal-start-sem" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center z-[100]">
      <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl border border-emerald-500/30 shadow-2xl relative">
        <button onclick="document.getElementById('modal-start-sem').classList.add('hidden')" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>

        <div class="text-center mb-6">
          <div class="w-12 h-12 bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-400">
            <i data-lucide="play-circle" class="w-6 h-6"></i>
          </div>
          <h3 class="text-xl font-bold text-white">Start New Semester</h3>
          <p class="text-xs text-slate-400 mt-1">Defines active batch year & dates</p>
        </div>

        <div id="start-sem-step-1" class="space-y-4">
          <div>
            <label class="text-xs text-slate-400 uppercase font-bold ml-1">Semester Number</label>
            <select id="inp-start-sem-num" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-emerald-500 outline-none">
              <option value="1">Semester 1 (Year 1)</option>
              <option value="2">Semester 2 (Year 1)</option>
              <option value="3">Semester 3 (Year 2)</option>
              <option value="4">Semester 4 (Year 2)</option>
              <option value="5">Semester 5 (Year 3)</option>
              <option value="6">Semester 6 (Year 3)</option>
              <option value="7">Semester 7 (Year 4)</option>
              <option value="8">Semester 8 (Year 4)</option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold ml-1">Start Date</label>
              <input type="date" id="inp-start-sem-date" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-emerald-500 outline-none" />
            </div>
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold ml-1">End Date</label>
              <input type="date" id="inp-end-sem-date" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white mt-1 focus:border-emerald-500 outline-none" />
            </div>
          </div>

          <button onclick="classMgr.reqStartSemOtp()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg transition flex items-center justify-center gap-2">Request OTP <i data-lucide="shield" class="w-4 h-4"></i></button>
        </div>

        <div id="start-sem-step-2" class="hidden space-y-4 animate-fade-in">
          <div class="bg-emerald-900/20 p-3 rounded-lg border border-emerald-500/30 text-center">
            <p class="text-sm text-emerald-400">OTP sent to Admin Email</p>
          </div>
          <input type="text" id="inp-start-sem-otp" placeholder="Enter OTP" class="w-full bg-slate-900 border border-emerald-500 text-center text-2xl tracking-widest text-white rounded-lg p-3 outline-none" maxlength="6" />

          <button onclick="classMgr.confirmStartSem()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg transition">Verify & Start</button>
        </div>
      </div>
    </div>
