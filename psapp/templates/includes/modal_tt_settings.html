<div id="modal-tt-settings" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center z-[100]">
      <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl border border-slate-700">
        <h3 class="text-xl font-bold text-white mb-4">Timetable Configuration</h3>
        <div class="space-y-4">
          <label class="text-xs text-slate-400 mb-2 block">Working Days</label>
          <div class="flex gap-2 flex-wrap" id="tt-set-days"></div>
        </div>
        <div>
          <label class="text-xs text-slate-400">Periods Per Day</label>
          <input type="number" id="tt-set-periods" value="7" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white" />
        </div>
        <button onclick="timetableMgr.applySettings()" class="w-full bg-teal-600 hover:bg-teal-500 text-white py-2 rounded font-bold">Apply & Recalculate</button>
        <button onclick="document.getElementById('modal-tt-settings').classList.add('hidden')" class="w-full text-slate-400 py-2 text-xs">Cancel</button>
      </div>
    </div>
